services:
  web:
    container_name: anubis-web
    build:
      context: .
      dockerfile: Dockerfile
    image: anubis:latest
    restart: unless-stopped
    cpus: "2.0"
    mem_limit: 2g
    mem_reservation: 512m
    pids_limit: 256
    env_file:
      - ./deploy/.env
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    expose:
      - "3000"
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  web:
    external: true
